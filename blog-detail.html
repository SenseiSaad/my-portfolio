<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post | Slancer</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f0f0f; color: #D4D4D4; }
        .prose :where(h1, h2, h3, h4, h5, h6) {
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            color: #ffffff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 0.5rem;
            margin-top: 2.5rem;
            letter-spacing: 0.05em;
        }
        .prose :where(strong) {
            color: #ffffff;
        }
    </style>
</head>
<body class="antialiased min-h-screen relative">
    <nav class="fixed top-0 w-full z-50 border-b border-white/10 bg-[#0f0f0f]/90 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="text-white hover:text-primary transition-colors flex items-center gap-2 text-sm font-mono group">
                <i class="fa-solid fa-arrow-left group-hover:-translate-x-1 transition-transform"></i> Back to Portfolio
            </a>
            <div class="text-xl font-bold tracking-widest text-white border border-white/20 px-3 py-1 font-mono">SLANCER</div>
        </div>
    </nav>
    <div class="relative z-10 pt-16">
        <div id="hero-section" class="relative w-full h-[40vh] min-h-[300px] mb-12 flex items-center justify-center overflow-hidden border-b border-white/10 bg-gray-800">
            <div class="absolute inset-0 hero-overlay pointer-events-none"></div>
            <div class="relative z-10 max-w-7xl mx-auto px-6 w-full pt-8 text-center">
                <span class="inline-block px-3 py-1 rounded bg-white/10 border border-white/20 text-white text-xs font-mono mb-6 tracking-widest backdrop-blur-md">BLOG</span>
                <h1 id="blog-title" class="text-4xl md:text-6xl font-bold tracking-tight leading-tight drop-shadow-2xl">
                    Loading...
                </h1>
                <p id="blog-author" class="text-gray-300 mt-4"></p>
            </div>
        </div>
        <div class="max-w-4xl mx-auto px-6 pb-24">
            <div id="blog-content" class="prose prose-invert prose-lg max-w-none text-gray-300">
                <p class="text-lg leading-relaxed mb-6">Fetching content...</p>
            </div>
            <div class="mt-8 pt-8 border-t border-white/10 text-center">
                <a href="index.html" class="text-white underline">Return Home</a>
            </div>
        </div>
    </div>
    <script src="api_config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Get ID from URL parameter (e.g., blog-detail.html?id=1)
            const urlParams = new URLSearchParams(window.location.search);
            const blogId = urlParams.get('id');

            if (!blogId) {
                document.getElementById('blog-title').textContent = 'Blog not found';
                document.getElementById('blog-content').innerHTML = '<p>Invalid blog ID provided in the URL.</p>';
                return;
            }

            try {
                // Fetch specific blog data from Django API
                const res = await fetch(`${API_BASE_URL}/api/blogs/view_one/${blogId}/`);
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                
                const blog = await res.json();
                
                // Inject data into HTML
                document.getElementById('blog-title').textContent = blog.title;
                const blogDate = blog.created_at ? new Date(blog.created_at).toLocaleDateString() : 'Recent';
                document.getElementById('blog-author').textContent = `By ${blog.author || 'Saad Waseem'} | ${blogDate}`;
                
                // Parse the content as Markdown
                const parsedContent = marked.parse(blog.content);
                document.getElementById('blog-content').innerHTML = parsedContent;
            } catch (error) {
                console.error('Error fetching blog:', error);
                document.getElementById('blog-title').textContent = 'Error Loading Blog';
                document.getElementById('blog-content').innerHTML = '<p>Could not connect to the backend API.</p>';
            }
        });
    </script>
</body>
</html>
