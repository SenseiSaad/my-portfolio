<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Detail | Slancer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f0f0f; color: #D4D4D4; }
        
        /* Custom Clean Markdown Styling */
        .markdown-body {
            font-family: 'Inter', sans-serif;
            font-size: 1.125rem;
            line-height: 1.8;
            color: #d1d5db; /* text-gray-300 */
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
            font-family: 'JetBrains Mono', monospace;
            color: #ffffff;
            font-weight: 700;
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
            line-height: 1.3;
        }
        .markdown-body h1 {
            font-size: 2.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.75rem;
        }
        .markdown-body h2 {
            font-size: 2rem;
            border-left: 4px solid #ffffff;
            padding-left: 1.25rem;
        }
        .markdown-body h3 {
            font-size: 1.5rem;
        }
        .markdown-body p {
            margin-bottom: 1.5rem;
        }
        .markdown-body ul, .markdown-body ol {
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
        }
        .markdown-body ul {
            list-style-type: disc;
        }
        .markdown-body ol {
            list-style-type: decimal;
        }
        .markdown-body li {
            margin-bottom: 0.5rem;
        }
        .markdown-body li::marker {
            color: #6b7280;
        }
        .markdown-body strong {
            color: #ffffff;
            font-weight: 600;
        }
        .markdown-body a {
            color: #ffffff;
            text-decoration: underline;
            text-underline-offset: 4px;
            transition: color 0.2s;
        }
        .markdown-body a:hover {
            color: #9ca3af;
        }
        .markdown-body blockquote {
            border-left: 4px solid rgba(255,255,255,0.2);
            padding-left: 1.25rem;
            color: #9ca3af;
            font-style: italic;
            margin-bottom: 1.5rem;
            background: rgba(255,255,255,0.02);
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
            border-radius: 0 0.5rem 0.5rem 0;
        }
        .markdown-body code {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            border: 1px solid rgba(255,255,255,0.1);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
            color: #e5e7eb;
        }
        .markdown-body pre {
            background-color: #000;
            padding: 1.5rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
            border: none;
            border-radius: 0;
            color: #e5e7eb;
            font-size: 0.9em;
        }
    </style>
</head>
<body class="antialiased min-h-screen relative">
    <nav class="fixed top-0 w-full z-50 border-b border-white/10 bg-[#0f0f0f]/90 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="text-white hover:text-primary transition-colors flex items-center gap-2 text-sm font-mono group">
                <i class="fa-solid fa-arrow-left group-hover:-translate-x-1 transition-transform"></i> Back to Portfolio
            </a>
            <div class="text-xl font-bold tracking-widest text-white border border-white/20 px-3 py-1 font-mono">SLANCER</div>
        </div>
    </nav>
    <div class="relative z-10 pt-16">
        <div id="hero-section" class="relative w-full h-[40vh] min-h-[300px] mb-12 flex items-center justify-center overflow-hidden border-b border-white/10 bg-[#0a0a0a]">
            <!-- Decorative background grid element -->
            <div class="absolute inset-0 opacity-20 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px]"></div>
            <div class="relative z-10 max-w-7xl mx-auto px-6 w-full pt-8 text-center flex flex-col items-center">
                <span class="inline-block px-3 py-1 bg-white/5 border border-white/10 text-gray-400 text-xs font-mono mb-4 tracking-widest backdrop-blur-md">PROJECT</span>
                <h1 id="project-title" class="text-4xl md:text-6xl font-bold tracking-tight leading-tight text-white mb-4">
                    Loading Project...
                </h1>
                <div id="project-tech" class="mt-2 flex flex-wrap justify-center gap-2 max-w-2xl">
                    <!-- Tech stack pills go here -->
                </div>
                <div class="mt-8 flex gap-4">
                     <a id="project-live-link" href="#" class="px-6 py-2 bg-white text-black font-bold rounded-full hidden hover:bg-gray-200 transition-colors shadow-[0_0_15px_rgba(255,255,255,0.3)]" target="_blank">Live Demo</a>
                     <a id="project-github-link" href="#" class="px-6 py-2 border border-white/20 text-white font-bold rounded-full hidden hover:bg-white/10 transition-colors" target="_blank">GitHub</a>
                </div>
            </div>
        </div>
        <div class="max-w-4xl mx-auto px-6 pb-24">
            <div class="bg-white/5 p-8 rounded-xl border border-white/10 shadow-2xl">
                <div class="flex flex-col mb-8 border-b border-white/10 pb-6 gap-4">
                    <h3 class="text-2xl font-bold text-white uppercase tracking-widest font-mono">Overview</h3>
                </div>
                <div id="project-content" class="markdown-body">
                    <p class="text-lg leading-relaxed mb-6">Fetching content...</p>
                </div>
            </div>
            <div class="mt-8 pt-8 border-t border-white/10 text-center">
                <a href="index.html" class="text-white underline">Return Home</a>
            </div>
        </div>
    </div>
    <script src="api_config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');

            if (!projectId) {
                document.getElementById('project-title').textContent = 'Project not found';
                document.getElementById('project-content').innerHTML = '<p>Invalid project ID.</p>';
                return;
            }

            try {
                const res = await fetch(`${API_BASE_URL}/api/projects/view_one/${projectId}/`);
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                
                const project = await res.json();
                
                if (!project) {
                    throw new Error('Project not found in results.');
                }
                
                document.getElementById('project-title').textContent = project.title;
                
                const techContainer = document.getElementById('project-tech');
                if (project.tech_stack) {
                    techContainer.innerHTML = project.tech_stack.split(',').map(tech => 
                        `<span class="bg-black/60 px-4 py-1.5 rounded-full text-xs font-mono text-gray-200 border border-white/20 backdrop-blur-md">${tech.trim()}</span>`
                    ).join('');
                } else {
                    techContainer.innerHTML = '';
                }
                
                if (project.live_link) {
                    const liveLink = document.getElementById('project-live-link');
                    liveLink.href = project.live_link;
                    liveLink.classList.remove('hidden');
                    liveLink.classList.add('inline-block');
                }
                
                if (project.github_link) {
                    const ghLink = document.getElementById('project-github-link');
                    ghLink.href = project.github_link;
                    ghLink.classList.remove('hidden');
                    ghLink.classList.add('inline-block');
                }
                
                // Parse the description as Markdown or fall back to newline replacements
                const parsedContent = marked.parse(project.description);
                document.getElementById('project-content').innerHTML = parsedContent;
            } catch (error) {
                console.error('Error fetching project:', error);
                document.getElementById('project-title').textContent = 'Error Loading Project';
                document.getElementById('project-content').innerHTML = '<p>Could not connect to the backend API or item not found.</p>';
            }
        });
    </script>
</body>
</html>
